# =============================================================================
# Sub2API Docker Compose - 服务器部署版
# =============================================================================
# PostgreSQL 由 Docker 管理，Redis 使用宝塔自带的
# 使用方式:
#   1. 创建 .env 文件配置密码
#   2. docker compose up -d
#   3. 访问: http://服务器IP:54371
# =============================================================================

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:16-alpine
    container_name: sub2api-postgres
    restart: unless-stopped
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=sub2api
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sub2api}
      - POSTGRES_DB=sub2api
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sub2api -d sub2api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - sub2api-net

  # Sub2API 应用
  sub2api:
    image: weishaw/sub2api:latest
    container_name: sub2api
    restart: unless-stopped
    ports:
      - "54371:8080"
    volumes:
      - ./sub2api-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AUTO_SETUP=true
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=release

      # PostgreSQL (Docker 内部)
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=sub2api
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-sub2api}
      - DATABASE_DBNAME=sub2api
      - DATABASE_SSLMODE=disable

      # Redis (宝塔自带，通过 host.docker.internal 访问宿主机)
      - REDIS_HOST=host.docker.internal
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=0
      - REDIS_ENABLE_TLS=false

      # JWT & Admin
      - JWT_SECRET=${JWT_SECRET:-ac8d35540f109251d946010e612c5d16a79ecd238efca549aea0d52c10f84175}
      - JWT_EXPIRE_HOUR=24
      - ADMIN_EMAIL=${ADMIN_EMAIL:-shiyi0x7f@gmail.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-my666666}

      - TZ=Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sub2api-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  sub2api-net:
    driver: bridge
