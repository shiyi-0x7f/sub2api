# =============================================================================
# Sub2API Docker Compose - 服务器部署版
# =============================================================================
# sub2api 使用 host 网络模式，直接访问宝塔自带的 Redis
# PostgreSQL 由 Docker 管理
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: sub2api-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=sub2api
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sub2api}
      - POSTGRES_DB=sub2api
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sub2api -d sub2api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sub2api:
    image: weishaw/sub2api:latest
    container_name: sub2api
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./sub2api-data:/app/data
    environment:
      - AUTO_SETUP=true
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=54371
      - SERVER_MODE=release

      # PostgreSQL (通过宿主机 127.0.0.1:5433 访问)
      - DATABASE_HOST=127.0.0.1
      - DATABASE_PORT=5433
      - DATABASE_USER=sub2api
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-sub2api}
      - DATABASE_DBNAME=sub2api
      - DATABASE_SSLMODE=disable

      # Redis (宝塔自带)
      - REDIS_HOST=127.0.0.1
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=13
      - REDIS_ENABLE_TLS=false

      # JWT & Admin
      - JWT_SECRET=${JWT_SECRET:-ac8d35540f109251d946010e612c5d16a79ecd238efca549aea0d52c10f84175}
      - JWT_EXPIRE_HOUR=24
      - ADMIN_EMAIL=${ADMIN_EMAIL:-shiyi0x7f@gmail.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-my666666}

      - TZ=Asia/Shanghai
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:54371/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
