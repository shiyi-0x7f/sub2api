# =============================================================================
# Sub2API Docker Compose - 连接已有的 dev-stack 数据库
# =============================================================================
# 使用方式:
#   1. 先构建镜像: docker compose build
#   2. 启动服务:   docker compose up -d
#   3. 查看日志:   docker compose logs -f
#   4. 访问前端:   http://localhost:8088
# =============================================================================

services:
  sub2api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sub2api
    restart: unless-stopped
    ports:
      - "54371:8080"
    volumes:
      - ./sub2api-data:/app/data
    environment:
      # Auto Setup
      - AUTO_SETUP=true

      # Server
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=debug

      # 连接现有的 dev-postgres (dev-stack 网络)
      - DATABASE_HOST=dev-postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=sub2api
      - DATABASE_PASSWORD=sub2api
      - DATABASE_DBNAME=sub2api
      - DATABASE_SSLMODE=disable

      # 连接现有的 dev-redis (dev-stack 网络)
      - REDIS_HOST=dev-redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - REDIS_ENABLE_TLS=false

      # JWT (固定 secret，容器重启不会失效)
      - JWT_SECRET=ac8d35540f109251d946010e612c5d16a79ecd238efca549aea0d52c10f84175
      - JWT_EXPIRE_HOUR=24

      # Admin (首次运行自动创建)
      - ADMIN_EMAIL=shiyi0x7f@gmail.com
      - ADMIN_PASSWORD=my666666

      # Timezone
      - TZ=Asia/Shanghai

    networks:
      - dev-stack
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# 连接已有的 dev-stack 外部网络
networks:
  dev-stack:
    external: true
